# 策略竞技场 - 8 位投资大师心智模型档案（T03）
# 详见 specs/008-strategy-arena/spec.md §FR-1
#
# 防幻觉约束：principles 仅取自公开著作原文要点，LLM 不得二次发挥。
# strategy_mapping 是把这些原则落到策略参数差异上的映射提示。

masters:
  - id: mind_buffett
    name: "巴菲特"
    works: ["伯克希尔股东信（1958-2025）", "《巴菲特致股东信》坎宁安编"]
    principles:
      - "安全边际：用40美分买1美元"
      - "护城河：品牌/规模/网络效应/转换成本"
      - "能力圈：5分钟说不清就跳过"
      - "市场先生：波动是机会而非风险"
      - "逆向操作：贪婪恐惧反向"
    strategy_mapping: "持仓集中 Top-10 > 60% + ROE 高 + 消费/金融龙头"
    domain: ["价值"]

  - id: mind_munger
    name: "芒格"
    works: ["《穷查理宝典》", "《芒格之道》"]
    principles:
      - "多元思维模型：跨学科基础模型组合决策"
      - "逆向思考：告诉我会死在哪里，我就不去那里"
      - "以合理价格买伟大公司，而非以低价买平庸公司"
      - "避免愚蠢比追求聪明更重要"
    strategy_mapping: "集中持有少数优质标的 + 低换手 + 逆向加仓"
    domain: ["价值", "逆向"]

  - id: mind_graham
    name: "格雷厄姆"
    works: ["《聪明的投资者》", "《证券分析》"]
    principles:
      - "内在价值：价格终将回归价值"
      - "市场先生：每日报价情绪化，可利用而非追随"
      - "安全边际：买入价大幅低于内在价值"
      - "净流动资产法：价格低于净流动资产"
    strategy_mapping: "低估值（PE/历史分位偏低）加仓 + 严格止损"
    domain: ["价值", "逆向"]

  - id: mind_lynch
    name: "林奇"
    works: ["《彼得·林奇的成功投资》", "《战胜华尔街》"]
    principles:
      - "十倍股：生活中发现成长公司"
      - "PEG：市盈率/盈利增长率 < 1 为低估"
      - "快速增长型公司是十倍股主要来源"
      - "翻石头：研究越多越有优势"
    strategy_mapping: "成长股 + PEG 估值 + 持仓适度集中"
    domain: ["成长"]

  - id: mind_dalio
    name: "达利欧"
    works: ["《原则》", "《经济机器是怎样运行的》", "《债务危机》"]
    principles:
      - "全天候投资：分散风险，适应各类经济环境"
      - "经济机器：信贷周期驱动繁荣与衰退"
      - "风险平价：按风险而非资金等权配置"
      - "原则化决策：算法化可重复"
    strategy_mapping: "风险平价 + 全球配置 + 多资产分散"
    domain: ["全球配置", "低波"]

  - id: mind_marks
    name: "马克斯"
    works: ["《投资最重要的事》", "《周期》"]
    principles:
      - "周期：均值回归是市场铁律"
      - "第二层思维：比共识更深入一层"
      - "风险：风险来自价格过高，而非波动"
      - "在别人恐惧时贪婪"
    strategy_mapping: "周期底部逆向加仓 + 回撤修复 + 低波"
    domain: ["逆向", "低波", "红利"]

  - id: mind_taleb
    name: "塔勒布"
    works: ["《反脆弱》", "《黑天鹅》", "《随机漫步的傻瓜》"]
    principles:
      - "反脆弱：从波动中受益"
      - "黑天鹅：极端事件不可预测但影响巨大"
      - "杠铃策略：90% 极度安全 + 10% 高风险"
      - "尾部风险：永远保留安全垫"
    strategy_mapping: "杠铃配置 + 严格止损（小阈值）+ 低波打底"
    domain: ["低波", "全球配置", "逆向"]

  - id: mind_bogle
    name: "博格尔"
    works: ["《共同基金常识》"]
    principles:
      - "指数化：长期跑赢主动管理"
      - "成本重要：最小化费率与换手"
      - "长期持有：时间是好公司的朋友"
      - "再平衡：纪律化维持目标配置"
    strategy_mapping: "宽基指数 + 极低费率 + 定投/低换手"
    domain: ["指数增强", "低波"]
