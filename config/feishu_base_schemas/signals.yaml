# 信号表 schema
table_name: "信号"
fields:
  - name: "日期"
    type: "date"
    primary_key: true
  - name: "基金代码"
    type: "text"
    primary_key: true
  - name: "基金名称"
    type: "text"
  - name: "信号类型"
    type: "single_select"
    property:
      options:
        - { name: "买入" }
        - { name: "加仓" }
        - { name: "减仓" }
        - { name: "卖出" }
        - { name: "观察" }
  - name: "建议操作"
    type: "text"
  - name: "置信度"
    type: "number"
    property:
      formatter: "0.00%"
  - name: "依据"
    type: "text"
views:
  - name: "今日信号"
    filter: { "日期": "today" }
    sort: { "置信度": "desc" }
